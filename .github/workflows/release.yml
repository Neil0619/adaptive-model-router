name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    if: github.ref_name == 'v0.3.0'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
      - name: Verify release gate
        working-directory: plugins/adaptive-model-router
        run: |-
          npm test
          npm run validate
          npm run eval
      - name: Build source archive, SBOM, and checksums
        run: |-
          mkdir -p dist
          git archive --format=tar.gz --prefix=adaptive-model-router-v0.3.0/ -o dist/adaptive-model-router-v0.3.0.tar.gz HEAD
          node plugins/adaptive-model-router/scripts/generate-sbom.mjs > dist/adaptive-model-router-v0.3.0.spdx.json
          cd dist
          sha256sum adaptive-model-router-v0.3.0.tar.gz adaptive-model-router-v0.3.0.spdx.json > SHA256SUMS
      - uses: actions/attest-build-provenance@v3
        with:
          subject-path: |-
            dist/adaptive-model-router-v0.3.0.tar.gz
            dist/adaptive-model-router-v0.3.0.spdx.json
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --title "$GITHUB_REF_NAME" --notes-file CHANGELOG.md
      - name: Advance protected stable branch after artifacts exist
        run: |-
          git branch -f stable "$GITHUB_SHA"
          git push origin stable
